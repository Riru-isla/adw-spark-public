services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: penny_pals
      POSTGRES_PASSWORD: password
      POSTGRES_DB: penny_pals_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penny_pals"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://penny_pals:password@db:5432/penny_pals_development
      RAILS_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    command: bash -c "bundle exec rails db:create db:migrate && bundle exec rails server -b 0.0.0.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  bundle_cache:
  node_modules_cache:
